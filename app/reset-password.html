<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Đặt lại mật khẩu — NextGen BA Banker</title>
<link rel="stylesheet" href="shared/app.css" />
</head>
<body>
<div class="app-shell" style="max-width:420px; padding-top:4rem;">
  <div class="card">
    <h1 style="text-align:center;">Đặt lại mật khẩu</h1>
    <p style="text-align:center; color:var(--text-soft); font-size:.85rem; margin-top:-.3rem;">NextGen BA Banker</p>

    <div id="loading-msg" style="text-align:center; color:var(--text-soft); font-size:.9rem; margin-top:1rem;">Đang xác thực liên kết...</div>

    <form id="reset-form" style="display:none; margin-top:1rem;">
      <div class="field">
        <label for="f-password">Mật khẩu mới</label>
        <input id="f-password" type="password" required minlength="6" placeholder="Tối thiểu 6 ký tự" />
      </div>
      <div class="field">
        <label for="f-password-confirm">Xác nhận mật khẩu mới</label>
        <input id="f-password-confirm" type="password" required minlength="6" placeholder="Nhập lại mật khẩu mới" />
      </div>
      <button class="btn" type="submit" id="submit-btn" style="width:100%;">Đặt lại mật khẩu</button>
      <p class="msg-error" id="msg-error" style="display:none;"></p>
      <p class="msg-success" id="msg-success" style="display:none;"></p>
    </form>

    <p id="invalid-link-msg" style="display:none; text-align:center; margin-top:1rem;">
      Liên kết không hợp lệ hoặc đã hết hạn. <a href="/app/login.html">Quay lại đăng nhập</a> và yêu cầu gửi lại email.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/app.js"></script>
<script>
  (function () {
    var loadingMsg = document.getElementById('loading-msg');
    var form = document.getElementById('reset-form');
    var invalidMsg = document.getElementById('invalid-link-msg');
    var errorOut = document.getElementById('msg-error');
    var successOut = document.getElementById('msg-success');

    window.sb.auth.onAuthStateChange(function (event) {
      if (event === 'PASSWORD_RECOVERY') {
        loadingMsg.style.display = 'none';
        form.style.display = 'block';
      }
    });

    setTimeout(function () {
      window.sb.auth.getSession().then(function (res) {
        if (form.style.display === 'block') return;
        loadingMsg.style.display = 'none';
        if (res.data.session) {
          form.style.display = 'block';
        } else {
          invalidMsg.style.display = 'block';
        }
      });
    }, 1500);

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      var password = document.getElementById('f-password').value;
      var confirmPassword = document.getElementById('f-password-confirm').value;
      var submitBtn = document.getElementById('submit-btn');

      errorOut.style.display = 'none';
      successOut.style.display = 'none';

      if (password !== confirmPassword) {
        errorOut.textContent = 'Xác nhận mật khẩu không khớp.';
        errorOut.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Đang lưu...';

      window.sb.auth.updateUser({ password: password }).then(function (res) {
        if (res.error) throw res.error;
        successOut.textContent = 'Đặt lại mật khẩu thành công! Đang chuyển tới Dashboard...';
        successOut.style.display = 'block';
        setTimeout(function () { window.location.href = '/app/dashboard.html'; }, 1500);
      }).catch(function (err) {
        errorOut.textContent = err.message || 'Có lỗi khi đặt lại mật khẩu.';
        errorOut.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Đặt lại mật khẩu';
      });
    });
  })();
</script>
</body>
</html>
