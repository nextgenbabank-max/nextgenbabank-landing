<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nộp bài file — NextGen BA Banker</title>
<link rel="stylesheet" href="shared/app.css" />
</head>
<body>
<div class="app-header">
  <a class="brand" href="/app/dashboard.html">NextGen BA Banker</a>
  <button id="logout-btn">Đăng xuất</button>
</div>

<div class="app-shell">
  <p><a href="/app/dashboard.html">&larr; Quay lại Dashboard</a></p>
  <div class="card">
    <h1 id="assignment-title">Đang tải...</h1>
    <p id="assignment-desc" style="color:var(--text-soft);"></p>
    <div id="assignment-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/app.js"></script>
<script>
  (function () {
    document.getElementById('logout-btn').addEventListener('click', signOut);

    var params = new URLSearchParams(window.location.search);
    var assignmentId = params.get('a');
    var body = document.getElementById('assignment-body');
    var userId;

    if (!assignmentId) {
      body.innerHTML = '<p class="msg-error">Thiếu mã bài tập.</p>';
      return;
    }

    requireAuth().then(function (session) {
      if (!session) return;
      userId = session.user.id;
      load();
    });

    function load() {
      Promise.all([
        window.sb.from('assignments').select('id,title,description,max_score').eq('id', assignmentId).single(),
        window.sb.from('submissions').select('file_path,score,max_score,graded,feedback').eq('assignment_id', assignmentId).eq('user_id', userId).maybeSingle()
      ]).then(function (results) {
        var aRes = results[0], sRes = results[1];
        if (aRes.error || !aRes.data) {
          document.getElementById('assignment-title').textContent = 'Không tìm thấy bài tập';
          return;
        }
        document.getElementById('assignment-title').textContent = aRes.data.title;
        document.getElementById('assignment-desc').textContent = aRes.data.description || '';

        var sub = sRes.data;

        if (sub && sub.graded) {
          body.innerHTML =
            '<p class="msg-success">Đã được chấm: ' + sub.score + '/' + sub.max_score + '</p>' +
            (sub.feedback ? '<div class="card" style="background:var(--bg-soft);"><strong>Nhận xét:</strong><p>' + escapeHtml(sub.feedback) + '</p></div>' : '') +
            '<p>File đã nộp: ' + escapeHtml(fileNameFromPath(sub.file_path)) + '</p>';
          return;
        }

        body.innerHTML =
          '<form id="file-form">' +
          '<div class="field"><label for="f-file">Chọn file (.xlsx, .xls, .docx, .doc, .pdf)</label>' +
          '<input id="f-file" type="file" accept=".xlsx,.xls,.docx,.doc,.pdf" required /></div>' +
          '<button class="btn" type="submit" id="submit-btn">' + (sub ? 'Nộp lại file' : 'Nộp file') + '</button>' +
          '<p class="msg-error" id="err" style="display:none;"></p>' +
          '<p class="msg-success" id="ok" style="display:none;"></p>' +
          '</form>';

        if (sub) {
          body.innerHTML += '<p style="color:var(--text-soft); font-size:.85rem; margin-top:.6rem;">Bạn đã nộp file "' + escapeHtml(fileNameFromPath(sub.file_path)) + '", đang chờ chấm. Nộp lại sẽ ghi đè file cũ.</p>';
        }

        document.getElementById('file-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var fileInput = document.getElementById('f-file');
          var file = fileInput.files[0];
          var submitBtn = document.getElementById('submit-btn');
          var err = document.getElementById('err');
          var ok = document.getElementById('ok');
          err.style.display = 'none';
          ok.style.display = 'none';

          if (!file) return;

          submitBtn.disabled = true;
          submitBtn.textContent = 'Đang tải lên...';

          var path = userId + '/' + assignmentId + '-' + file.name;

          window.sb.storage.from('submissions').upload(path, file, { upsert: true }).then(function (upRes) {
            if (upRes.error) throw upRes.error;
            var payload = { assignment_id: assignmentId, user_id: userId, type: 'file', file_path: path };
            return window.sb.from('submissions').upsert(payload, { onConflict: 'assignment_id,user_id' });
          }).then(function (subRes) {
            if (subRes.error) throw subRes.error;
            ok.textContent = 'Nộp file thành công! Bài sẽ được giảng viên chấm và phản hồi.';
            ok.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Nộp lại file';
          }).catch(function (e2) {
            err.textContent = e2.message || 'Có lỗi khi nộp file.';
            err.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Nộp file';
          });
        });
      });
    }

    function fileNameFromPath(path) {
      if (!path) return '';
      var parts = path.split('-');
      return parts.slice(1).join('-');
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
  })();
</script>
</body>
</html>
