<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nộp bài tự luận — NextGen BA Banker</title>
<link rel="stylesheet" href="shared/app.css" />
</head>
<body>
<div class="app-header">
  <a class="brand" href="/app/dashboard.html">NextGen BA Banker</a>
  <button id="logout-btn">Đăng xuất</button>
</div>

<div class="app-shell">
  <p><a href="/app/dashboard.html">&larr; Quay lại Dashboard</a></p>
  <div class="card">
    <h1 id="assignment-title">Đang tải...</h1>
    <p id="assignment-desc" style="color:var(--text-soft);"></p>
    <div id="assignment-body"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="shared/app.js"></script>
<script>
  (function () {
    document.getElementById('logout-btn').addEventListener('click', signOut);

    var params = new URLSearchParams(window.location.search);
    var assignmentId = params.get('a');
    var body = document.getElementById('assignment-body');
    var userId;

    if (!assignmentId) {
      body.innerHTML = '<p class="msg-error">Thiếu mã bài tập.</p>';
      return;
    }

    requireAuth().then(function (session) {
      if (!session) return;
      userId = session.user.id;
      load();
    });

    function load() {
      Promise.all([
        window.sb.from('assignments').select('id,title,description,max_score').eq('id', assignmentId).single(),
        window.sb.from('submissions').select('answer_text,score,max_score,graded,feedback').eq('assignment_id', assignmentId).eq('user_id', userId).maybeSingle()
      ]).then(function (results) {
        var aRes = results[0], sRes = results[1];
        if (aRes.error || !aRes.data) {
          document.getElementById('assignment-title').textContent = 'Không tìm thấy bài tập';
          return;
        }
        document.getElementById('assignment-title').textContent = aRes.data.title;
        document.getElementById('assignment-desc').textContent = aRes.data.description || '';

        var sub = sRes.data;

        if (sub && sub.graded) {
          body.innerHTML =
            '<p class="msg-success">Đã được chấm: ' + sub.score + '/' + sub.max_score + '</p>' +
            (sub.feedback ? '<div class="card" style="background:var(--bg-soft);"><strong>Nhận xét:</strong><p>' + escapeHtml(sub.feedback) + '</p></div>' : '') +
            '<div class="field"><label>Bài đã nộp</label><textarea disabled>' + escapeHtml(sub.answer_text || '') + '</textarea></div>';
          return;
        }

        body.innerHTML =
          '<form id="essay-form">' +
          '<div class="field"><label for="f-answer">Bài làm của bạn</label><textarea id="f-answer" required>' + escapeHtml(sub ? sub.answer_text : '') + '</textarea></div>' +
          '<button class="btn" type="submit" id="submit-btn">' + (sub ? 'Cập nhật bài nộp' : 'Nộp bài') + '</button>' +
          '<p class="msg-error" id="err" style="display:none;"></p>' +
          '<p class="msg-success" id="ok" style="display:none;"></p>' +
          '</form>';

        if (sub) {
          body.innerHTML += '<p style="color:var(--text-soft); font-size:.85rem; margin-top:.6rem;">Bạn đã nộp bài này, đang chờ chấm. Nộp lại sẽ ghi đè bài cũ.</p>';
        }

        document.getElementById('essay-form').addEventListener('submit', function (e) {
          e.preventDefault();
          var answer = document.getElementById('f-answer').value.trim();
          var submitBtn = document.getElementById('submit-btn');
          var err = document.getElementById('err');
          var ok = document.getElementById('ok');
          err.style.display = 'none';
          ok.style.display = 'none';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Đang nộp...';

          var payload = { assignment_id: assignmentId, user_id: userId, type: 'essay', answer_text: answer };

          window.sb.from('submissions').upsert(payload, { onConflict: 'assignment_id,user_id' }).then(function (res) {
            if (res.error) throw res.error;
            ok.textContent = 'Nộp bài thành công! Bài sẽ được giảng viên chấm và phản hồi.';
            ok.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Cập nhật bài nộp';
          }).catch(function (e2) {
            err.textContent = e2.message || 'Có lỗi khi nộp bài.';
            err.style.display = 'block';
            submitBtn.disabled = false;
            submitBtn.textContent = 'Nộp bài';
          });
        });
      });
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
  })();
</script>
</body>
</html>
